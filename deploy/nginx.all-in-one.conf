server {
    listen 8080;
    server_name _;

    location ~ /\. {
        return 404;
    }

    location = / {
        root /site;
        index index.html;
    }

    location = /index.html {
        root /site;
    }

    location /assets/ {
        alias /site/;
    }

    location /huawei/ {
        root /app/data;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_before_body /assets/huawei-header.html;
        add_after_body /assets/autoindex-footer.html;
    }

    location /sungrow/ {
        root /app/data;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_before_body /assets/sungrow-header.html;
        add_after_body /assets/autoindex-footer.html;
    }
}
