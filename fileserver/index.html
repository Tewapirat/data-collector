<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inverter Data Collector</title>
    <link rel="stylesheet" href="/assets/style.css">
  </head>
  <body>
    <main class="page">
      <section class="header">
        <div class="brand">
          <img class="logo" src="/assets/greenergy-logo.svg" alt="">
          <div>
            <p class="eyebrow">CSV file server</p>
            <h1>Inverter Data Collector</h1>
          </div>
        </div>
        <div class="summary">
          <p>Browse CSV exports collected from Huawei and Sungrow inverter accounts.</p>
          <p>Files are organized by vendor, year, and month for quick download and review.</p>
        </div>
      </section>

      <section class="links" aria-label="Vendor CSV folders">
        <a class="vendor-card" href="/huawei/">
          <span class="vendor-name">Huawei</span>
          <span class="vendor-path">/huawei/</span>
          <span class="vendor-action">Open CSV folder</span>
        </a>
        <a class="vendor-card" href="/sungrow/">
          <span class="vendor-name">Sungrow</span>
          <span class="vendor-path">/sungrow/</span>
          <span class="vendor-action">Open CSV folder</span>
        </a>
      </section>
    </main>
  </body>
</html>
